name: Production CI/CD Pipeline

on:
  push:
    branches:
      - master

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: 20
  APP_PORT: 3002
  APP_NAME: ci-cd-frontend
  WEBSITE_URL: https://tekeyefrontend.clickmasters.pk

jobs:
  # ====================================================
  # 1️⃣ Code Quality & Tests
  # ====================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint || true

      - name: Security Audit
        run: npm audit --audit-level=high || true

      - name: Run Tests
        run: npm test || true

  # ====================================================
  # 2️⃣ Build Application
  # ====================================================
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: frontend/.next

  # ====================================================
  # 3️⃣ Manual Approval Before Production
  # ====================================================
  approval:
    name: Production Approval
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ env.WEBSITE_URL }}

    steps:
      - name: Wait for Approval
        run: echo "Waiting for production approval..."

  # ====================================================
  # 4️⃣ Deploy to VPS
  # ====================================================
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e

            echo "Loading NVM..."
            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 24.13.0

            node -v
            npm -v

            APP_DIR=${{ secrets.APP_DIR }}
            cd $APP_DIR

            echo "Saving current commit..."
            PREVIOUS_COMMIT=$(git rev-parse HEAD)

            echo "Fetching latest code..."
            git fetch origin
            git reset --hard origin/master

            echo "Cleaning old build..."
            rm -rf node_modules .next

            echo "Installing dependencies..."
            npm install

            echo "Building application..."
            npm run build

            echo "Restarting PM2..."
            pm2 restart ${{ env.APP_NAME }} || pm2 start npm --name "${{ env.APP_NAME }}" -- start
            pm2 save

            echo "Waiting for app startup..."
            sleep 15

            echo "Running health check..."
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:${{ env.APP_PORT }})

            if [ "$STATUS" != "200" ]; then
              echo "Deployment failed. Rolling back..."
              git reset --hard $PREVIOUS_COMMIT
              rm -rf node_modules .next
              npm install
              npm run build
              pm2 restart ${{ env.APP_NAME }}
              exit 1
            fi

            echo "Deployment successful"
          EOF

  # ====================================================
  # 5️⃣ Post Deployment Monitoring
  # ====================================================
monitoring:
  name: Post Deployment Monitoring
  runs-on: ubuntu-latest
  needs: deploy

  steps:
    - name: Wait for Application to be Ready
      run: |
        echo "Waiting for application to start..."
        sleep 30  # Give it more time to start

    - name: Check Website Health with Retries
      run: |
        echo "Monitoring website..."
        MAX_RETRIES=30  # Increased retries
        RETRY_INTERVAL=10
        
        for i in $(seq 1 $MAX_RETRIES)
        do
          echo "Attempt $i of $MAX_RETRIES..."
          
          # Add timeout and follow redirects
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --connect-timeout 5 \
            --max-time 10 \
            --location \
            ${{ env.WEBSITE_URL }} || echo "failed")
          
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed!"
            exit 0
          elif [ "$STATUS" = "failed" ]; then
            echo "⏳ Connection failed - server might still be starting"
          else
            echo "⚠️  Got status: $STATUS"
          fi
          
          sleep $RETRY_INTERVAL
        done
        
        echo "❌ Health check failed after $MAX_RETRIES attempts"
        exit 1
  # ====================================================
  # 6️⃣ Pipeline Summary
  # ====================================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [quality, build, deploy, monitoring]
    if: always()

    steps:
      - name: Show Results
        run: |
          echo "CI/CD Pipeline Finished"
          echo "Quality: ${{ needs.quality.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
          echo "Monitoring: ${{ needs.monitoring.result }}"