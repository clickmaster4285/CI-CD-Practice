name: CI/CD Pipeline with Auto-Rollback

on:
  push:
    branches:
      - master  # Trigger on push to master branch

jobs:
  sync-branches:
    name: Sync master → main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Sync master to main
        run: |
          echo "🔄 Fetching all branches..."
          git fetch --all
          
          echo "🔄 Checking out main branch..."
          git checkout main || git checkout -b main
          
          echo "🔄 Merging master into main..."
          git merge origin/master --no-ff -m "Auto-merge master into main [skip ci]"
          
          echo "📤 Pushing changes to main..."
          git push origin main
          
          echo "✅ Sync completed!"

  ci:
    name: Build & Test
    needs: sync-branches
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4  # Updated to v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint || echo "No linting configured"

      - name: Run tests
        run: npm test || echo "No tests found"

      - name: Build project
        run: npm run build
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4  # Updated to v4 (FIXES THE ERROR!)
        with:
          name: build-output
          path: frontend/.next
          retention-days: 7

  wait-for-approval:
    name: ⏳ Wait for Deployment Approval
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://tekeyefrontend.clickmasters.pk
    steps:
      - name: Waiting for approval
        run: |
          echo "✅ CI pipeline completed successfully!"
          echo "⏳ Waiting for manual approval to deploy to production..."
          echo "🔗 Go to GitHub Actions to approve or reject the deployment"
          echo "🌐 Website: https://tekeyefrontend.clickmasters.pk"

  cd:
    name: Deploy to VPS with Auto-Rollback
    needs: wait-for-approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      # Step 1: Get current version (for rollback)
      - name: Get current commit hash from VPS
        id: get-current-version
        run: |
          echo "🔖 Getting current commit hash from VPS..."
          CURRENT_HASH=$(ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.APP_DIR }} && git rev-parse HEAD
          ")
          echo "current_hash=$CURRENT_HASH" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_HASH"

      # Step 2: Get current PM2 status (for monitoring)
      - name: Get current PM2 status
        id: get-pm2-status
        continue-on-error: true
        run: |
          echo "📊 Getting current PM2 status..."
          PM2_STATUS=$(ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.APP_DIR }}
            pm2 jlist | jq -r '.[] | select(.name == \"ci-cd-frontend\") | .pm2_env.status' 2>/dev/null || echo 'unknown'
          ")
          echo "pm2_status=$PM2_STATUS" >> $GITHUB_OUTPUT
          echo "Current PM2 status: $PM2_STATUS"

      # Step 3: Deploy new version (with continue-on-error)
      - name: Deploy new version via SSH
        id: deploy
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            
            echo '🚀 Starting deployment of new version...'
            echo '📂 Current directory:' \$(pwd)
            
            # Load NVM
            echo '🔄 Loading NVM...'
            export NVM_DIR=\"\$HOME/.nvm\"
            if [ -s \"\$NVM_DIR/nvm.sh\" ]; then
              \\. \"\$NVM_DIR/nvm.sh\"
              echo '✅ NVM loaded'
            else
              echo '⚠️ NVM not found, using direct path'
              export PATH=\"/root/.nvm/versions/node/v24.13.0/bin:\$PATH\"
            fi
            
            # Use specific Node version
            echo '🔄 Using Node.js v24.13.0...'
            nvm use v24.13.0 2>/dev/null || echo 'Using Node from PATH'
            
            # Show versions
            echo '🔧 Node version:' \$(node --version)
            echo '🔧 npm version:' \$(npm --version)
            echo '🔧 PM2 version:' \$(pm2 --version)
            
            # Navigate to project directory
            echo '📂 Changing to project directory...'
            cd ${{ secrets.APP_DIR }}
            echo '✅ Current directory:' \$(pwd)
            
            # Pull latest code
            echo '📦 Pulling latest code from main branch...'
            git fetch --all
            git checkout main
            git reset --hard origin/main
            echo '✅ Latest code pulled:' \$(git log -1 --pretty=format:'%h - %s (%ci)')
            
            # Install dependencies
            echo '📦 Installing dependencies...'
            npm ci --only=production || npm install
            
            # Build project
            echo '🏗️ Building project...'
            npm run build
            
            # Test the build locally before restarting
            echo '🧪 Testing build...'
            if [ ! -d \".next\" ]; then
              echo '❌ Build failed - .next directory not found!'
              exit 1
            fi
            
            # Restart PM2 with new code
            echo '🚀 Managing PM2 process...'
            if pm2 list | grep -q 'ci-cd-frontend'; then
              echo '🔄 Restarting existing PM2 process...'
              PORT=3002 pm2 restart ci-cd-frontend
            else
              echo '🆕 Starting new PM2 process...'
              PORT=3002 pm2 start npm --name 'ci-cd-frontend' -- start
            fi
            
            # Save PM2 configuration
            pm2 save
            
            # Wait for app to start
            echo '⏳ Waiting for application to start...'
            sleep 10
            
            # Test if application is running
            echo '🌐 Testing application...'
            HTTP_STATUS=\$(curl -o /dev/null -s -w \"%{http_code}\" http://localhost:3002)
            if [ \"\$HTTP_STATUS\" -eq 200 ] || [ \"\$HTTP_STATUS\" -eq 301 ] || [ \"\$HTTP_STATUS\" -eq 302 ]; then
              echo \"✅ Application is responding with HTTP \$HTTP_STATUS\"
            else
              echo \"❌ Application is not responding correctly! HTTP \$HTTP_STATUS\"
              exit 1
            fi
            
            echo '✅ New version deployed successfully!'
          "

      # Step 4: Rollback on failure
      - name: ⚠️ Rollback to previous version (deployment failed)
        if: steps.deploy.outcome == 'failure'
        run: |
          echo "❌ DEPLOYMENT FAILED! Starting automatic rollback..."
          echo "🔄 Rolling back to version: ${{ steps.get-current-version.outputs.current_hash }}"
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            
            echo '🔄 Loading NVM for rollback...'
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \\. \"\$NVM_DIR/nvm.sh\"
            
            cd ${{ secrets.APP_DIR }}
            
            echo '📦 Fetching previous version...'
            git fetch --all
            git checkout ${{ steps.get-current-version.outputs.current_hash }}
            
            echo '📦 Installing dependencies for previous version...'
            npm ci --only=production || npm install
            
            echo '🏗️ Building previous version...'
            npm run build
            
            echo '🚀 Restarting PM2 with previous version...'
            PORT=3002 pm2 restart ci-cd-frontend
            
            echo '✅ Rollback completed. Application is now at previous stable version.'
          "
          
          echo "⚠️ Rollback process finished. Deployment marked as failed."

      # Step 5: Verify final status
      - name: Verify final deployment status
        id: verify
        run: |
          if [[ "${{ steps.deploy.outcome }}" == "failure" ]]; then
            echo "❌ Deployment failed and rollback was performed."
            echo "🔙 Application rolled back to: ${{ steps.get-current-version.outputs.current_hash }}"
            
            # Get current version after rollback
            FINAL_HASH=$(ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
              cd ${{ secrets.APP_DIR }} && git rev-parse --short HEAD
            ")
            echo "📌 Current version on VPS: $FINAL_HASH"
            
            exit 1  # Mark job as failed
          else
            echo "✅ Deployment successful!"
            NEW_HASH=$(ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
              cd ${{ secrets.APP_DIR }} && git rev-parse --short HEAD
            ")
            echo "📌 New version deployed: $NEW_HASH"
            echo "🌎 Website: https://tekeyefrontend.clickmasters.pk"
          fi

      # Step 6: Send notification (Slack/Email can be added here)
      - name: Send deployment notification
        if: always()
        run: |
          if [[ "${{ steps.deploy.outcome }}" == "failure" ]]; then
            echo "🔴 DEPLOYMENT FAILED - Rollback executed"
            echo "🔙 Rolled back to: ${{ steps.get-current-version.outputs.current_hash }}"
          else
            echo "🟢 DEPLOYMENT SUCCESSFUL"
            echo "🚀 New version deployed from main branch"
          fi
          echo "⏰ Time: $(date)"
          echo "🔍 View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  notify-on-failure:
    name: Notify on Pipeline Failure
    needs: [sync-branches, ci, cd]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          echo "❌ CI/CD PIPELINE FAILED"
          echo "📦 Repository: ${{ github.repository }}"
          echo "🔍 Branch: ${{ github.ref_name }}"
          echo "💻 Commit: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.triggering_actor }}"
          echo "🔗 Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # You can add Slack/Discord/Email webhooks here
          # curl -X POST -H 'Content-type: application/json' --data '{"text":"Deployment failed!"}' YOUR_SLACK_WEBHOOK_URL