name: CI/CD Pipeline with Complete Error Handling & Auto-Rollback

on:
  push:
    branches:
      - master  # Trigger on push to master branch

# Environment variables for all jobs
env:
  NODE_VERSION: 20
  APP_PORT: 3002
  PM2_APP_NAME: ci-cd-frontend
  WEBSITE_URL: https://tekeyefrontend.clickmasters.pk

jobs:
  # ============================================
  # JOB 1: Sync Branches
  # ============================================
  sync-branches:
    name: 🔄 Sync master → main
    runs-on: ubuntu-latest
    outputs:
      sync_status: ${{ steps.sync.outputs.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Sync master to main
        id: sync
        run: |
          echo "🔄 Fetching all branches..."
          git fetch --all
          
          echo "🔄 Checking out main branch..."
          if git show-ref --verify --quiet refs/heads/main; then
            git checkout main
          else
            git checkout -b main
          fi
          
          echo "🔄 Merging master into main..."
          if git merge origin/master --no-ff -m "Auto-merge master into main [skip ci]"; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Merge successful"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Merge failed"
            exit 1
          fi
          
          echo "📤 Pushing changes to main..."
          git push origin main
          
          echo "✅ Sync completed!"

  # ============================================
  # JOB 2: CI - Build & Test
  # ============================================
  ci:
    name: 🏗️ Build & Test
    needs: sync-branches
    if: success()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    outputs:
      build_status: ${{ steps.build.outcome }}
      test_status: ${{ steps.test.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        id: install
        run: |
          npm ci || npm install
          echo "✅ Dependencies installed"

      - name: 🔍 Run linting
        id: lint
        continue-on-error: true
        run: |
          if npm run lint; then
            echo "✅ Linting passed"
          else
            echo "⚠️ Linting failed but continuing"
          fi

      - name: 🧪 Run tests
        id: test
        continue-on-error: true
        run: |
          if npm test; then
            echo "✅ Tests passed"
            echo "outcome=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Tests failed but continuing"
            echo "outcome=failure" >> $GITHUB_OUTPUT
          fi

      - name: 🔨 Build project
        id: build
        run: |
          if npm run build; then
            echo "✅ Build successful"
            echo "outcome=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Build failed"
            echo "outcome=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
        
      - name: 📤 Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.sha }}
          path: frontend/.next
          retention-days: 7

  # ============================================
  # JOB 3: Manual Approval
  # ============================================
  wait-for-approval:
    name: ⏳ Wait for Approval
    needs: ci
    if: success()
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ env.WEBSITE_URL }}
    steps:
      - name: Waiting for approval
        run: |
          echo "✅ CI pipeline completed successfully!"
          echo "📊 Test status: ${{ needs.ci.outputs.test_status }}"
          echo "⏳ Waiting for manual approval to deploy to production..."
          echo "🔗 Go to GitHub Actions to approve or reject"
          echo "🌐 Website: ${{ env.WEBSITE_URL }}"

  # ============================================
  # JOB 4: CD - Deploy with Full Error Handling
  # ============================================
  cd:
    name: 🚀 Deploy with Auto-Rollback
    needs: wait-for-approval
    if: success()
    runs-on: ubuntu-latest
    environment: production
    outputs:
      deploy_status: ${{ steps.deploy.outcome }}
      monitor_status: ${{ steps.monitor.outcome }}
      final_version: ${{ steps.get-final-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      # ===== PRE-DEPLOYMENT CHECKS =====
      - name: 🔍 Pre-deployment VPS Health Check
        id: pre-check
        continue-on-error: true
        run: |
          echo "🔍 Checking VPS status before deployment..."
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            
            echo '📊 System Status:'
            echo '--------------'
            echo 'Uptime:' \$(uptime)
            echo 'Disk space:' \$(df -h / | awk 'NR==2 {print \$5}')
            echo 'Memory:' \$(free -h | awk 'NR==2 {print \$3\"/\"\$2}')
            echo 'CPU load:' \$(cat /proc/loadavg | awk '{print \$1\", \"\$2\", \"\$3}')
            
            # Check if directory exists
            if [ ! -d ${{ secrets.APP_DIR }} ]; then
              echo '❌ Directory not found!'
              exit 1
            fi
            
            # Check PM2 status
            echo '📊 PM2 Status:'
            pm2 list
            
            echo '✅ Pre-deployment checks passed'
          "
          
          echo "status=passed" >> $GITHUB_OUTPUT

      # ===== GET CURRENT VERSION =====
      - name: 🔖 Get current version info
        id: get-current-version
        run: |
          echo "🔖 Getting current version from VPS..."
          
          VERSION_INFO=$(ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.APP_DIR }} 2>/dev/null || exit 1
            
            echo \"commit=\$(git rev-parse HEAD)\"
            echo \"branch=\$(git rev-parse --abbrev-ref HEAD)\"
            echo \"message=\$(git log -1 --pretty=%s)\"
            echo \"date=\$(git log -1 --pretty=%ci)\"
          ")
          
          # Parse the output
          while IFS= read -r line; do
            if [[ \$line == commit=* ]]; then
              echo "current_hash=\${line#commit=}" >> $GITHUB_OUTPUT
            elif [[ \$line == branch=* ]]; then
              echo "current_branch=\${line#branch=}" >> $GITHUB_OUTPUT
            elif [[ \$line == message=* ]]; then
              echo "current_message=\${line#message=}" >> $GITHUB_OUTPUT
            elif [[ \$line == date=* ]]; then
              echo "current_date=\${line#date=}" >> $GITHUB_OUTPUT
            fi
          done <<< "\$VERSION_INFO"
          
          echo "📌 Current commit: ${{ steps.get-current-version.outputs.current_hash }}"
          echo "📌 Current branch: ${{ steps.get-current-version.outputs.current_branch }}"

      # ===== BACKUP CURRENT STATE =====
      - name: 💾 Backup current state
        run: |
          echo "💾 Creating backup of current state..."
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.APP_DIR }}
            BACKUP_FILE=\"/tmp/pre-deploy-backup-\$(date +%Y%m%d-%H%M%S).tar.gz\"
            tar -czf \$BACKUP_FILE --exclude=node_modules --exclude=.next .
            echo \"✅ Backup created: \$BACKUP_FILE\"
          "

      # ===== DEPLOY NEW VERSION =====
      - name: 🚀 Deploy new version
        id: deploy
        continue-on-error: true
        run: |
          echo "🚀 Starting deployment of new version..."
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            
            # Error handling function
            error_handler() {
              echo \"❌ Error on line \$1\"
              exit 1
            }
            trap 'error_handler \$LINENO' ERR
            
            echo '🔄 Loading NVM...'
            export NVM_DIR=\"\$HOME/.nvm\"
            if [ -s \"\$NVM_DIR/nvm.sh\" ]; then
              \\. \"\$NVM_DIR/nvm.sh\"
              nvm use v24.13.0 2>/dev/null || echo 'Using Node from PATH'
            fi
            
            cd ${{ secrets.APP_DIR }}
            
            echo '📦 Pulling latest code from main branch...'
            git fetch --all
            git checkout main
            git reset --hard origin/main
            
            echo '🗑️ Cleaning...'
            rm -rf node_modules .next
            npm cache clean --force
            
            echo '📦 Installing dependencies...'
            npm install
            
            echo '🏗️ Building project...'
            npm run build
            
            # Validate build
            if [ ! -d \".next\" ]; then
              echo '❌ Build failed - .next directory not found!'
              exit 1
            fi
            
            echo '🚀 Restarting PM2 process...'
            PORT=${{ env.APP_PORT }} pm2 restart ${{ env.PM2_APP_NAME }} || PORT=${{ env.APP_PORT }} pm2 start npm --name '${{ env.PM2_APP_NAME }}' -- start
            pm2 save
            
            echo '⏳ Waiting for application to start...'
            sleep 15
            
            echo '🌐 Testing application...'
            HTTP_STATUS=\$(curl -o /dev/null -s -w \"%{http_code}\" http://localhost:${{ env.APP_PORT }})
            if [ \"\$HTTP_STATUS\" -eq 200 ] || [ \"\$HTTP_STATUS\" -eq 301 ] || [ \"\$HTTP_STATUS\" -eq 302 ]; then
              echo \"✅ Application responding with HTTP \$HTTP_STATUS\"
            else
              echo \"❌ Application not responding correctly! HTTP \$HTTP_STATUS\"
              exit 1
            fi
            
            echo '✅ New version deployed successfully!'
          "
          
          echo "outcome=${{ job.status }}" >> $GITHUB_OUTPUT

      # ===== POST-DEPLOYMENT MONITORING =====
      - name: 🔍 Extended Post-Deployment Monitoring
        id: monitor
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        run: |
          echo "🔍 Starting 15-minute post-deployment monitoring..."
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            
            # Colors for output
            RED='\033[0;31m'
            GREEN='\033[0;32m'
            YELLOW='\033[1;33m'
            NC='\033[0m'
            
            # Monitoring configuration
            CHECK_INTERVAL=30
            TOTAL_CHECKS=30  # 15 minutes total
            ERROR_THRESHOLD=3
            WARN_THRESHOLD=5
            ERROR_COUNT=0
            WARN_COUNT=0
            
            echo \"📊 Starting monitoring for \$((TOTAL_CHECKS * CHECK_INTERVAL / 60)) minutes...\"
            
            for i in \$(seq 1 \$TOTAL_CHECKS); do
              echo \"\n⏱️  Check \$i/\$TOTAL_CHECKS...\"
              
              # Check 1: Process status
              PROCESS_STATUS=\$(pm2 list | grep ${{ env.PM2_APP_NAME }} | grep -o 'online\\|stopped\\|errored' || echo 'not found')
              if [ \"\$PROCESS_STATUS\" != \"online\" ]; then
                echo -e \"${RED}❌ Process not online (status: \$PROCESS_STATUS)${NC}\"
                ERROR_COUNT=\$((ERROR_COUNT + 1))
              else
                echo -e \"${GREEN}✅ Process online${NC}\"
              fi
              
              # Check 2: HTTP endpoint
              HTTP_STATUS=\$(curl -o /dev/null -s -w \"%{http_code}\" http://localhost:${{ env.APP_PORT }})
              if [ \"\$HTTP_STATUS\" -lt 200 ] || [ \"\$HTTP_STATUS\" -ge 500 ]; then
                echo -e \"${RED}❌ Bad HTTP status: \$HTTP_STATUS${NC}\"
                ERROR_COUNT=\$((ERROR_COUNT + 1))
              elif [ \"\$HTTP_STATUS\" -ge 400 ]; then
                echo -e \"${YELLOW}⚠️ HTTP warning: \$HTTP_STATUS${NC}\"
                WARN_COUNT=\$((WARN_COUNT + 1))
              else
                echo -e \"${GREEN}✅ HTTP \$HTTP_STATUS${NC}\"
              fi
              
              # Check 3: Error logs
              ERROR_LOGS=\$(pm2 logs ${{ env.PM2_APP_NAME }} --lines 20 --nostream | grep -i error | tail -5)
              ERROR_COUNT_LOGS=\$(echo \"\$ERROR_LOGS\" | grep -v '^$' | wc -l)
              if [ \"\$ERROR_COUNT_LOGS\" -gt 0 ]; then
                echo -e \"${YELLOW}⚠️ Found \$ERROR_COUNT_LOGS errors in logs${NC}\"
                echo \"\$ERROR_LOGS\" | while read line; do
                  echo \"  → \$line\"
                done
                WARN_COUNT=\$((WARN_COUNT + ERROR_COUNT_LOGS))
              fi
              
              # Check 4: Memory usage
              MEM_USAGE=\$(pm2 jlist | jq -r '.[] | select(.name==\"${{ env.PM2_APP_NAME }}\") | .monit.memory' 2>/dev/null || echo '0')
              MEM_MB=\$((MEM_USAGE / 1048576))
              if [ \$MEM_MB -gt 1536 ]; then  # 1.5GB
                echo -e \"${RED}❌ High memory usage: \${MEM_MB}MB${NC}\"
                ERROR_COUNT=\$((ERROR_COUNT + 1))
              elif [ \$MEM_MB -gt 1024 ]; then  # 1GB
                echo -e \"${YELLOW}⚠️ Memory usage: \${MEM_MB}MB${NC}\"
                WARN_COUNT=\$((WARN_COUNT + 1))
              else
                echo -e \"${GREEN}✅ Memory: \${MEM_MB}MB${NC}\"
              fi
              
              # Check 5: CPU usage
              CPU_USAGE=\$(pm2 jlist | jq -r '.[] | select(.name==\"${{ env.PM2_APP_NAME }}\") | .monit.cpu' 2>/dev/null || echo '0')
              if [ \${CPU_USAGE%.*} -gt 80 ]; then
                echo -e \"${RED}❌ High CPU usage: \$CPU_USAGE%${NC}\"
                ERROR_COUNT=\$((ERROR_COUNT + 1))
              elif [ \${CPU_USAGE%.*} -gt 50 ]; then
                echo -e \"${YELLOW}⚠️ CPU usage: \$CPU_USAGE%${NC}\"
                WARN_COUNT=\$((WARN_COUNT + 1))
              else
                echo -e \"${GREEN}✅ CPU: \$CPU_USAGE%${NC}\"
              fi
              
              # Check if error threshold reached
              if [ \$ERROR_COUNT -ge \$ERROR_THRESHOLD ]; then
                echo -e \"\n${RED}❌ ERROR THRESHOLD REACHED: \$ERROR_COUNT errors${NC}\"
                exit 1
              fi
              
              # Display current stats
              echo \"📊 Current: Errors=\$ERROR_COUNT, Warnings=\$WARN_COUNT\"
              
              sleep \$CHECK_INTERVAL
            done
            
            if [ \$WARN_COUNT -ge \$WARN_THRESHOLD ]; then
              echo -e \"\n${YELLOW}⚠️ Monitoring completed with \$WARN_COUNT warnings${NC}\"
            else
              echo -e \"\n${GREEN}✅ All monitoring checks passed!${NC}\"
            fi
          "
          
          echo "outcome=${{ job.status }}" >> $GITHUB_OUTPUT

      # ===== SMART ROLLBACK (if deployment failed) =====
      - name: ⚠️ Smart Rollback - Build Failure
        if: steps.deploy.outcome == 'failure'
        run: |
          echo "❌ BUILD FAILED! Starting smart rollback..."
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            
            cd ${{ secrets.APP_DIR }}
            
            echo '🔄 Rolling back to previous version...'
            git checkout ${{ steps.get-current-version.outputs.current_hash }}
            
            echo '🗑️ Cleaning...'
            rm -rf node_modules .next
            
            echo '📦 Installing dependencies...'
            npm install
            
            # Auto-fix Tailwind/PostCSS issues
            echo '🔧 Checking for missing dependencies...'
            if ! npm list @tailwindcss/postcss > /dev/null 2>&1; then
              echo '⚠️ Installing Tailwind CSS...'
              npm install --save-dev @tailwindcss/postcss postcss autoprefixer tailwindcss
            fi
            
            # Create config files if missing
            if [ ! -f postcss.config.js ] && [ ! -f postcss.config.mjs ]; then
              echo '📝 Creating postcss.config.js...'
              cat > postcss.config.js << 'EOF'
            module.exports = {
              plugins: {
                '@tailwindcss/postcss': {},
                autoprefixer: {},
              },
            }
            EOF
            fi
            
            echo '🏗️ Building previous version...'
            npm run build
            
            echo '🚀 Restarting PM2...'
            PORT=${{ env.APP_PORT }} pm2 restart ${{ env.PM2_APP_NAME }}
            pm2 save
            
            echo '✅ Rollback completed'
          "
          
          echo "⚠️ Rollback complete - previous version restored"

      # ===== POST-DEPLOYMENT ROLLBACK (if monitoring failed) =====
      - name: 🔄 Post-Deployment Rollback
        if: steps.monitor.outcome == 'failure'
        run: |
          echo "❌ POST-DEPLOYMENT ERRORS DETECTED! Rolling back..."
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            
            cd ${{ secrets.APP_DIR }}
            
            # Save error logs
            echo '📝 Saving error logs...'
            pm2 logs ${{ env.PM2_APP_NAME }} --lines 500 --nostream > /tmp/post-deploy-errors-\$(date +%s).log
            
            echo '🔄 Rolling back to previous version...'
            git checkout ${{ steps.get-current-version.outputs.current_hash }}
            rm -rf node_modules .next
            npm install
            npm run build
            
            PORT=${{ env.APP_PORT }} pm2 restart ${{ env.PM2_APP_NAME }}
            pm2 save
            
            echo '✅ Rollback completed'
          "
          
          echo "❌ Rollback executed - post-deployment monitoring failed"

      # ===== EMERGENCY RECOVERY (if both fail) =====
      - name: 🚨 Emergency Recovery
        if: steps.deploy.outcome == 'failure' && steps.monitor.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "🚨 EMERGENCY RECOVERY MODE ACTIVATED"
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            
            cd ${{ secrets.APP_DIR }}
            
            # Create full backup
            tar -czf /tmp/emergency-backup-\$(date +%s).tar.gz .
            
            # Force reset to last known good state
            git fetch --all
            git reset --hard origin/main~2  # Go back 2 commits
            
            # Complete reinstall
            rm -rf node_modules .next package-lock.json
            npm cache clean --force
            npm install
            npm install --save-dev tailwindcss postcss autoprefixer @tailwindcss/postcss
            npm run build
            
            # Force restart
            pm2 delete ${{ env.PM2_APP_NAME }} 2>/dev/null || true
            PORT=${{ env.APP_PORT }} pm2 start npm --name '${{ env.PM2_APP_NAME }}' -- start
            pm2 save
            
            echo '✅ Emergency recovery completed'
          "

      # ===== GET FINAL VERSION =====
      - name: Get final version
        id: get-final-version
        if: always()
        run: |
          FINAL_VERSION=$(ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.APP_DIR }} 2>/dev/null && git rev-parse --short HEAD || echo 'unknown'
          ")
          echo "version=$FINAL_VERSION" >> $GITHUB_OUTPUT
          echo "📌 Final version: $FINAL_VERSION"

      # ===== CREATE ERROR REPORT =====
      - name: 📊 Create error report
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.APP_DIR }}
            
            echo '# Deployment Error Report' > /tmp/error-report.md
            echo \"Date: \$(date)\" >> /tmp/error-report.md
            echo \"Workflow: ${{ github.workflow }}\" >> /tmp/error-report.md
            echo \"Run ID: ${{ github.run_id }}\" >> /tmp/error-report.md
            echo \"Commit: ${{ github.sha }}\" >> /tmp/error-report.md
            
            echo -e '\n## System Status\n' >> /tmp/error-report.md
            echo '```' >> /tmp/error-report.md
            pm2 list >> /tmp/error-report.md 2>&1
            echo '```' >> /tmp/error-report.md
            
            echo -e '\n## Recent Errors\n' >> /tmp/error-report.md
            echo '```' >> /tmp/error-report.md
            pm2 logs ${{ env.PM2_APP_NAME }} --lines 100 --nostream | grep -i error >> /tmp/error-report.md 2>&1
            echo '```' >> /tmp/error-report.md
            
            echo -e '\n## Git Status\n' >> /tmp/error-report.md
            echo '```' >> /tmp/error-report.md
            git log -5 --oneline >> /tmp/error-report.md 2>&1
            echo '```' >> /tmp/error-report.md
          "
          
          # Download error report
          scp -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/error-report.md ./error-report.md

      - name: Upload error report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-report-${{ github.run_id }}
          path: error-report.md
          retention-days: 30

  # ============================================
  # JOB 5: Notification
  # ============================================
  notify:
    name: 📧 Send Notification
    needs: [sync-branches, ci, cd]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine final status
        id: status
        run: |
          if [[ "${{ needs.cd.result }}" == "success" ]] && [[ "${{ needs.cd.outputs.monitor_status }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=✅ Deployment Successful" >> $GITHUB_OUTPUT
            echo "color=green" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.cd.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ Deployment Failed - Rollback Executed" >> $GITHUB_OUTPUT
            echo "color=red" >> $GITHUB_OUTPUT
          else
            echo "status=warning" >> $GITHUB_OUTPUT
            echo "message=⚠️ Deployment Issues Detected" >> $GITHUB_OUTPUT
            echo "color=yellow" >> $GITHUB_OUTPUT
          fi

      - name: Send notification
        run: |
          echo "${{ steps.status.outputs.message }}"
          echo "📦 Repository: ${{ github.repository }}"
          echo "🔍 Branch: ${{ github.ref_name }}"
          echo "💻 Commit: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.triggering_actor }}"
          echo "📌 Final version: ${{ needs.cd.outputs.final_version }}"
          echo "🔗 Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Add Slack/Discord webhook here if needed
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"${{ steps.status.outputs.message }}\"}" \
          #   YOUR_WEBHOOK_URL

  # ============================================
  # JOB 6: Create GitHub Issue on Failure
  # ============================================
  create-issue:
    name: 📝 Create Issue on Failure
    needs: [cd, notify]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Deployment Failed: ${context.runId}`,
              body: `## 🚨 Deployment Failure Report

              ### 📋 Details
              - **Workflow:** ${context.workflow}
              - **Run ID:** ${context.runId}
              - **Branch:** ${context.ref}
              - **Commit:** ${context.sha}
              - **Triggered by:** ${context.actor}
              - **Time:** ${new Date().toISOString()}

              ### ❌ Failure Type
              ${{ needs.cd.outputs.deploy_status == 'failure' && '🚫 Build/Deployment Error' || '⚠️ Post-Deployment Error' }}

              ### 🔄 Actions Taken
              ${{ needs.cd.outputs.deploy_status == 'failure' && '- ✅ Automatic rollback executed' || '- ⚠️ Monitoring detected issues' }}

              ### 📊 Final State
              - **Final version:** ${{ needs.cd.outputs.final_version }}
              - **Previous version:** ${{ needs.cd.outputs.current_hash }}

              ### 🔍 Investigation Steps
              1. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
              2. SSH into VPS: \`ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}\`
              3. Check application directory: \`cd ${{ secrets.APP_DIR }}\`
              4. View PM2 logs: \`pm2 logs ${{ env.PM2_APP_NAME }}\`
              5. Check error reports in GitHub Actions artifacts

              ### 🛠️ Next Steps
              - Fix the underlying issue
              - Test locally
              - Deploy again with fix

              ---
              *Auto-generated by GitHub Actions* 🤖
              `
            });
            console.log(`Created issue #${issue.number}`);