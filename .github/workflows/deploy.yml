name: Production CI/CD Pipeline

on:
  push:
    branches: [master]

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: 20
  APP_PORT: 3002
  APP_NAME: ci-cd-frontend

jobs:

# ===============================
# 1️⃣ CODE QUALITY & SECURITY
# ===============================
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint || true

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Run tests
        run: npm test || true


# ===============================
# 2️⃣ BUILD APPLICATION
# ===============================
  build:
    name: Build Application
    needs: quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: frontend/.next


# ===============================
# 3️⃣ APPROVAL BEFORE DEPLOY
# ===============================
  approval:
    name: Manual Approval
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - run: echo "Waiting for production approval..."


# ===============================
# 4️⃣ DEPLOY TO VPS
# ===============================
  deploy:
    name: Deploy to Production
    needs: approval
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'

          set -e

          APP_DIR=${{ secrets.APP_DIR }}

          echo "Starting deployment..."

          cd $APP_DIR

          PREVIOUS_COMMIT=$(git rev-parse HEAD)

          echo "Backup commit: $PREVIOUS_COMMIT"

          git fetch origin
          git reset --hard origin/master

          echo "Installing dependencies"
          npm install

          echo "Building application"
          npm run build

          echo "Restarting PM2"
          pm2 restart ${{ env.APP_NAME }} || pm2 start npm --name "${{ env.APP_NAME }}" -- start
          pm2 save

          sleep 10

          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:${{ env.APP_PORT }})

          if [ "$STATUS" != "200" ]; then
            echo "Deployment failed. Rolling back..."
            git reset --hard $PREVIOUS_COMMIT
            npm install
            npm run build
            pm2 restart ${{ env.APP_NAME }}
            exit 1
          fi

          echo "Deployment successful"

          EOF


# ===============================
# 5️⃣ POST DEPLOY HEALTH CHECK
# ===============================
  monitoring:
    name: Post Deployment Monitoring
    needs: deploy
    runs-on: ubuntu-latest

    steps:

      - name: Monitor server
        run: |
          echo "Checking server health..."

          for i in {1..10}
          do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://tekeyefrontend.clickmasters.pk)

            if [ "$STATUS" != "200" ]; then
              echo "Health check failed"
              exit 1
            fi

            echo "Health OK"
            sleep 15
          done


# ===============================
# 6️⃣ DEPLOYMENT SUMMARY
# ===============================
  summary:
    name: Deployment Summary
    needs: [quality, build, deploy, monitoring]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Summary
        run: |
          echo "Pipeline finished"
          echo "Quality: ${{ needs.quality.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
          echo "Monitoring: ${{ needs.monitoring.result }}"