name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  cd:
    name: Deploy to VPS
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e  # Exit on error
            
            echo '🔍 Checking project directory...'
            cd ${{ secrets.APP_DIR }}
            pwd
            ls -la
            
            echo '📦 Pulling latest code...'
            git fetch --all
            git reset --hard origin/main
            
            echo '📦 Installing dependencies...'
            npm install
            
            echo '🏗️ Building project...'
            npm run build
            
            echo '🚀 Restarting PM2 process...'
            PORT=3002 pm2 restart ci-cd-frontend || PORT=3002 pm2 start npm --name 'ci-cd-frontend' -- start
            
            echo '✅ Deployment complete!'
          "