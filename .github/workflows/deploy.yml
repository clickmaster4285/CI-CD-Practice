name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  sync-branches:
    name: Sync master → main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Merge master into main
        run: |
          git fetch --all
          git checkout main
          git merge origin/master --no-ff -m "Auto-merge master into main [skip ci]"
          git push origin main

  ci:
    name: Build & Test
    needs: sync-branches
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test || echo "No tests found"

      - name: Build project
        run: npm run build
        
      - name: Upload build artifact (optional)
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: frontend/.next

  # Manual approval step
  wait-for-approval:
    name: Wait for Deployment Approval
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://tekeyefrontend.clickmasters.pk
    steps:
      - name: Waiting for approval
        run: echo "Waiting for manual approval to deploy..."

  cd:
    name: Deploy to VPS
    needs: wait-for-approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \\. \"\$NVM_DIR/nvm.sh\"
            nvm use v24.13.0
            
            cd ${{ secrets.APP_DIR }}
            git fetch --all
            git checkout main
            git reset --hard origin/main
            npm install
            npm run build
            PORT=3002 pm2 restart ci-cd-frontend || PORT=3002 pm2 start npm --name 'ci-cd-frontend' -- start
          "