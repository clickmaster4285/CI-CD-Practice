name: CI/CD Pipeline with Auto-Rollback

on:
  push:
    branches:
      - master  # Trigger on push to master branch

jobs:
  sync-branches:
    name: Sync master → main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Sync master to main
        run: |
          echo "🔄 Fetching all branches..."
          git fetch --all
          
          echo "🔄 Checking out main branch..."
          git checkout main || git checkout -b main
          
          echo "🔄 Merging master into main..."
          git merge origin/master --no-ff -m "Auto-merge master into main [skip ci]"
          
          echo "📤 Pushing changes to main..."
          git push origin main
          
          echo "✅ Sync completed!"

  ci:
    name: Build & Test
    needs: sync-branches
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint || echo "No linting configured"

      - name: Run tests
        run: npm test || echo "No tests found"

      - name: Build project
        run: npm run build
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: frontend/.next
          retention-days: 7

  wait-for-approval:
    name: ⏳ Wait for Deployment Approval
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://tekeyefrontend.clickmasters.pk
    steps:
      - name: Waiting for approval
        run: |
          echo "✅ CI pipeline completed successfully!"
          echo "⏳ Waiting for manual approval to deploy to production..."
          echo "🔗 Go to GitHub Actions to approve or reject the deployment"
          echo "🌐 Website: https://tekeyefrontend.clickmasters.pk"

  cd:
    name: Deploy to VPS with Auto-Rollback
    needs: wait-for-approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      # Step 1: Get current version info
      - name: Get current commit hash from VPS
        id: get-current-version
        run: |
          echo "🔖 Getting current commit hash from VPS..."
          CURRENT_HASH=$(ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.APP_DIR }} 2>/dev/null && git rev-parse HEAD || echo 'none'
          ")
          echo "current_hash=$CURRENT_HASH" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_HASH"

      - name: Get current branch
        id: get-current-branch
        run: |
          echo "🔖 Getting current branch from VPS..."
          CURRENT_BRANCH=$(ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.APP_DIR }} 2>/dev/null && git rev-parse --abbrev-ref HEAD || echo 'none'
          ")
          echo "current_branch=$CURRENT_BRANCH" >> $GITHUB_OUTPUT
          echo "Current branch: $CURRENT_BRANCH"

      # Step 2: Deploy new version
      - name: Deploy new version via SSH
        id: deploy
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            
            echo '🚀 Starting deployment of new version...'
            
            # Load NVM
            export NVM_DIR=\"\$HOME/.nvm\"
            if [ -s \"\$NVM_DIR/nvm.sh\" ]; then
              \\. \"\$NVM_DIR/nvm.sh\"
              nvm use v24.13.0 2>/dev/null || echo 'Using Node from PATH'
            fi
            
            cd ${{ secrets.APP_DIR }}
            
            echo '📦 Pulling latest code from main branch...'
            git fetch --all
            git checkout main
            git reset --hard origin/main
            
            echo '🗑️ Cleaning node_modules and cache...'
            rm -rf node_modules .next
            npm cache clean --force
            
            echo '📦 Installing dependencies...'
            npm install
            
            echo '🏗️ Building project...'
            npm run build
            
            echo '🚀 Restarting PM2 process...'
            PORT=3002 pm2 restart ci-cd-frontend || PORT=3002 pm2 start npm --name 'ci-cd-frontend' -- start
            pm2 save
            
            echo '⏳ Waiting for application to start...'
            sleep 10
            
            echo '🌐 Testing application...'
            HTTP_STATUS=\$(curl -o /dev/null -s -w \"%{http_code}\" http://localhost:3002)
            if [ \"\$HTTP_STATUS\" -eq 200 ] || [ \"\$HTTP_STATUS\" -eq 301 ] || [ \"\$HTTP_STATUS\" -eq 302 ]; then
              echo \"✅ Application is responding with HTTP \$HTTP_STATUS\"
            else
              echo \"❌ Application is not responding correctly! HTTP \$HTTP_STATUS\"
              exit 1
            fi
            
            echo '✅ New version deployed successfully!'
          "

      # Step 3: Enhanced Rollback with dependency fixing
      - name: ⚠️ Smart Rollback with Auto-Fix
        if: steps.deploy.outcome == 'failure'
        run: |
          echo "❌ DEPLOYMENT FAILED! Starting smart rollback with auto-fix..."
          echo "🔄 Rolling back to version: ${{ steps.get-current-version.outputs.current_hash }}"
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            
            echo '🔄 Loading NVM for rollback...'
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \\. \"\$NVM_DIR/nvm.sh\"
            nvm use v24.13.0 2>/dev/null
            
            cd ${{ secrets.APP_DIR }}
            
            echo '📦 Cleaning current directory...'
            git reset --hard HEAD
            git clean -fd
            
            echo '📦 Fetching previous version...'
            git fetch --all
            
            # Save current branch name
            CURRENT_BRANCH=\"\${{ steps.get-current-branch.outputs.current_branch }}\"
            
            if [ \"\$CURRENT_BRANCH\" != \"none\" ] && [ \"\$CURRENT_BRANCH\" != \"HEAD\" ]; then
              echo '🔄 Switching back to branch:' \$CURRENT_BRANCH
              git checkout \$CURRENT_BRANCH
            else
              echo '🔄 Creating temporary branch from previous commit...'
              git checkout -b rollback-branch-\$(date +%s) ${{ steps.get-current-version.outputs.current_hash }}
            fi
            
            echo '🗑️ Cleaning node_modules and cache...'
            rm -rf node_modules .next
            npm cache clean --force
            
            echo '📦 Installing dependencies with auto-fix...'
            npm install
            
            # Check for missing Tailwind CSS modules and fix
            echo '🔧 Checking for missing PostCSS/Tailwind dependencies...'
            if ! npm list @tailwindcss/postcss > /dev/null 2>&1; then
              echo '⚠️ @tailwindcss/postcss not found, installing...'
              npm install --save-dev @tailwindcss/postcss postcss autoprefixer
            fi
            
            # Check if tailwindcss is installed
            if ! npm list tailwindcss > /dev/null 2>&1; then
              echo '⚠️ tailwindcss not found, installing...'
              npm install --save-dev tailwindcss
            fi
            
            # Check if postcss.config.js exists and is configured
            if [ ! -f postcss.config.js ] && [ ! -f postcss.config.mjs ]; then
              echo '⚠️ postcss.config.js not found, creating...'
              cat > postcss.config.js << 'EOF'
            module.exports = {
              plugins: {
                '@tailwindcss/postcss': {},
                autoprefixer: {},
              },
            }
            EOF
            fi
            
            # Check if tailwind config exists
            if [ ! -f tailwind.config.js ] && [ ! -f tailwind.config.mjs ]; then
              echo '⚠️ tailwind.config.js not found, creating...'
              cat > tailwind.config.js << 'EOF'
            /** @type {import('tailwindcss').Config} */
            module.exports = {
              content: [
                './app/**/*.{js,ts,jsx,tsx,mdx}',
                './pages/**/*.{js,ts,jsx,tsx,mdx}',
                './components/**/*.{js,ts,jsx,tsx,mdx}',
              ],
              theme: {
                extend: {},
              },
              plugins: [],
            }
            EOF
            fi
            
            echo '🏗️ Building previous version...'
            npm run build
            
            echo '🚀 Restarting PM2 with previous version...'
            PORT=3002 pm2 restart ci-cd-frontend || PORT=3002 pm2 start npm --name 'ci-cd-frontend' -- start
            pm2 save
            
            echo '⏳ Waiting for application to start...'
            sleep 15
            
            echo '🌐 Testing application...'
            HTTP_STATUS=\$(curl -o /dev/null -s -w \"%{http_code}\" http://localhost:3002)
            if [ \"\$HTTP_STATUS\" -eq 200 ] || [ \"\$HTTP_STATUS\" -eq 301 ] || [ \"\$HTTP_STATUS\" -eq 302 ]; then
              echo \"✅ Application restored with HTTP \$HTTP_STATUS\"
            else
              echo \"⚠️ Application may not be fully functional, but rollback completed\"
            fi
            
            echo '✅ Rollback completed. Application restored to previous stable version.'
          "
          
          echo "⚠️ Rollback process finished. Original deployment marked as failed."

      # Step 4: Emergency fix if rollback fails
      - name: 🚨 Emergency Recovery
        if: steps.deploy.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "🚨 Attempting emergency recovery..."
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            
            cd ${{ secrets.APP_DIR }}
            
            echo '📦 Creating backup of current state...'
            tar -czf /tmp/app-backup-\$(date +%s).tar.gz . 2>/dev/null || true
            
            echo '🔄 Force reset to last known good state...'
            git fetch --all
            git reset --hard origin/main~1 2>/dev/null || git reset --hard origin/main
            
            echo '🗑️ Full clean and reinstall...'
            rm -rf node_modules .next package-lock.json
            npm cache clean --force
            
            echo '📦 Fresh install...'
            npm install
            
            echo '🔧 Installing critical dependencies...'
            npm install --save-dev tailwindcss postcss autoprefixer @tailwindcss/postcss
            
            echo '🏗️ Rebuild...'
            npm run build
            
            echo '🚀 Force PM2 restart...'
            pm2 delete ci-cd-frontend 2>/dev/null || true
            PORT=3002 pm2 start npm --name 'ci-cd-frontend' -- start
            pm2 save
            
            echo '✅ Emergency recovery completed'
          "

      # Step 5: Verify final status
      - name: Verify final deployment status
        id: verify
        run: |
          if [[ "${{ steps.deploy.outcome }}" == "failure" ]]; then
            echo "❌ DEPLOYMENT FAILED - Rollback and recovery executed"
            
            # Get final status
            FINAL_STATUS=$(ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
              cd ${{ secrets.APP_DIR }} 2>/dev/null && 
              echo \"Branch: \$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'unknown')\"
              echo \"Commit: \$(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')\"
              pm2 list | grep 'ci-cd-frontend' || echo 'PM2 process not found'
            ")
            echo "📌 Current status on VPS:"
            echo "$FINAL_STATUS"
            
            exit 1  # Mark job as failed but app is running
          else
            echo "✅ Deployment successful!"
            NEW_HASH=$(ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
              cd ${{ secrets.APP_DIR }} && git rev-parse --short HEAD
            ")
            echo "📌 New version deployed: $NEW_HASH"
            echo "🌎 Website: https://tekeyefrontend.clickmasters.pk"
          fi

      # Step 6: Notification
      - name: Send deployment notification
        if: always()
        run: |
          if [[ "${{ steps.deploy.outcome }}" == "failure" ]]; then
            echo "🔴 DEPLOYMENT FAILED - Rollback executed"
            echo "🔙 Rolled back to: ${{ steps.get-current-version.outputs.current_hash }}"
            echo "🛠️ Auto-fix applied to restore functionality"
          else
            echo "🟢 DEPLOYMENT SUCCESSFUL"
            echo "🚀 New version deployed from main branch"
          fi
          echo "⏰ Time: $(date)"
          echo "🔍 View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  notify-on-failure:
    name: Notify on Pipeline Failure
    needs: [sync-branches, ci, cd]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          echo "❌ CI/CD PIPELINE FAILED"
          echo "📦 Repository: ${{ github.repository }}"
          echo "🔍 Branch: ${{ github.ref_name }}"
          echo "💻 Commit: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.triggering_actor }}"
          echo "🔗 Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "🔧 Auto-recovery was attempted. Check VPS manually if issues persist."
          echo "💡 SSH into VPS and check: cd ${{ secrets.APP_DIR }} && npm run build"