name: Production CI/CD Pipeline

on:
  push:
    branches:
      - master

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false

# Environment variables
env:
  NODE_VERSION: 20
  APP_PORT: 3002
  APP_NAME: ci-cd-frontend
  WEBSITE_URL: https://tekeyefrontend.clickmasters.pk

jobs:
  # ====================================================
  # 1️⃣ Code Quality & Tests
  # ====================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint || true

      - name: Security Audit
        run: npm audit --audit-level=high || true

      - name: Run Tests
        run: npm test || true

  # ====================================================
  # 2️⃣ Build Application
  # ====================================================
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: frontend/.next
          retention-days: 1  # Only keep for 1 day

  # ====================================================
  # 3️⃣ Manual Approval Before Production (FIXED)
  # ====================================================
  approval:
    name: Manual Approval Required
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ env.WEBSITE_URL }}
    
    steps:
      - name: Display Approval Instructions
        run: |
          echo "=========================================="
          echo "⏳ MANUAL APPROVAL REQUIRED"
          echo "=========================================="
          echo ""
          echo "📋 Deployment Details:"
          echo "   - Environment: production"
          echo "   - Website: ${{ env.WEBSITE_URL }}"
          echo "   - App Name: ${{ env.APP_NAME }}"
          echo "   - Port: ${{ env.APP_PORT }}"
          echo ""
          echo "🔍 How to Approve:"
          echo "   1. Go to the Actions tab in GitHub"
          echo "   2. Click on this workflow run"
          echo "   3. Look for the 'Manual Approval Required' job"
          echo "   4. Click 'Review deployments' button"
          echo "   5. Select 'Approve' or 'Reject'"
          echo ""
          echo "⏳ Waiting for approval..."
          echo "=========================================="

  # ====================================================
  # 4️⃣ Deploy to VPS (Only runs after approval)
  # ====================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approval
    environment:
      name: production
      url: ${{ env.WEBSITE_URL }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy Application
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            
            echo "=========================================="
            echo "🚀 DEPLOYMENT STARTED"
            echo "=========================================="
            
            # Load NVM
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              source "$NVM_DIR/nvm.sh"
              echo "✅ NVM loaded"
            else
              echo "❌ NVM not found"
              exit 1
            fi
            
            # Use Node.js
            echo "Using Node.js:"
            nvm use 20 || nvm install 20
            node -v
            npm -v
            
            # Navigate to app directory
            APP_DIR="${{ secrets.APP_DIR }}"
            if [ ! -d "$APP_DIR" ]; then
              echo "❌ App directory not found: $APP_DIR"
              exit 1
            fi
            
            cd "$APP_DIR"
            
            # Save current commit for rollback
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "📦 Previous commit: $(echo $PREVIOUS_COMMIT | cut -c1-7)"
            
            # Pull latest code
            echo "📥 Fetching latest code..."
            git fetch origin
            git reset --hard origin/master
            
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "📦 New commit: $(echo $NEW_COMMIT | cut -c1-7)"
            
            # Install dependencies
            echo "📦 Installing dependencies..."
            rm -rf node_modules
            npm ci
            
            # Build application
            echo "🏗️ Building application..."
            npm run build
            
            # Setup PM2 if not exists
            if ! command -v pm2 &> /dev/null; then
              echo "📦 Installing PM2 globally..."
              npm install -g pm2
            fi
            
            # Start/Restart application
            echo "🔄 Starting application with PM2..."
            if pm2 list | grep -q "${{ env.APP_NAME }}"; then
              pm2 restart "${{ env.APP_NAME }}"
            else
              pm2 start npm --name "${{ env.APP_NAME }}" -- start
            fi
            pm2 save
            
            # Wait for application to start
            echo "⏳ Waiting for application to start..."
            sleep 15
            
            # Local health check
            echo "🏥 Performing local health check..."
            LOCAL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              http://localhost:${{ env.APP_PORT }} || echo "failed")
            
            if [ "$LOCAL_STATUS" = "200" ]; then
              echo "✅ Local health check passed (HTTP 200)"
            else
              echo "⚠️ Local health check returned: $LOCAL_STATUS"
              echo "⚠️ This may be normal if the app needs more time"
            fi
            
            echo "=========================================="
            echo "✅ DEPLOYMENT COMPLETED"
            echo "=========================================="
            echo "🌐 Website: ${{ env.WEBSITE_URL }}"
            echo "📱 App: ${{ env.APP_NAME }}"
          EOF

  # ====================================================
  # 5️⃣ Post Deployment Verification
  # ====================================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    
    steps:
      - name: Verify Website is Accessible
        run: |
          echo "=========================================="
          echo "🔍 VERIFYING DEPLOYMENT"
          echo "=========================================="
          
          MAX_ATTEMPTS=12
          ATTEMPT=1
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."
            
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 20 \
              --location \
              "${{ env.WEBSITE_URL }}" || echo "000")
            
            case $HTTP_CODE in
              200)
                echo "✅ Website is accessible! (HTTP 200)"
                exit 0
                ;;
              000)
                echo "⏳ Connection timeout - retrying..."
                ;;
              *)
                if [ $HTTP_CODE -ge 200 ] && [ $HTTP_CODE -lt 500 ]; then
                  echo "✅ Website responded with HTTP $HTTP_CODE"
                  exit 0
                else
                  echo "⚠️ Got HTTP $HTTP_CODE - retrying..."
                fi
                ;;
            esac
            
            ATTEMPT=$((ATTEMPT + 1))
            [ $ATTEMPT -le $MAX_ATTEMPTS ] && sleep 10
          done
          
          echo "⚠️ Could not verify website, but deployment completed"
          echo "📝 Please check manually: ${{ env.WEBSITE_URL }}"
          exit 0  # Don't fail the pipeline

  # ====================================================
  # 6️⃣ Deployment Summary
  # ====================================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [quality, build, approval, deploy, verify]
    if: always()
    
    steps:
      - name: Display Summary
        run: |
          echo "=========================================="
          echo "📊 DEPLOYMENT SUMMARY"
          echo "=========================================="
          echo ""
          echo "Job Statuses:"
          echo "-------------"
          echo "📝 Quality: ${{ needs.quality.result }}"
          echo "🏗️ Build: ${{ needs.build.result }}"
          echo "👤 Approval: ${{ needs.approval.result }}"
          echo "🚀 Deploy: ${{ needs.deploy.result }}"
          echo "🔍 Verify: ${{ needs.verify.result }}"
          echo ""
          echo "Deployment Details:"
          echo "------------------"
          echo "🌐 Website: ${{ env.WEBSITE_URL }}"
          echo "📱 App Name: ${{ env.APP_NAME }}"
          echo "🔌 Port: ${{ env.APP_PORT }}"
          echo ""
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Production deployment completed successfully!"
          else
            echo "⚠️ Deployment completed with warnings"
          fi
          echo "=========================================="