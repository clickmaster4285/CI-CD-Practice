name: Production CI/CD Pipeline

on:
  push:
    branches:
      - master

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false

# Environment variables
env:
  NODE_VERSION: 20
  APP_PORT: 3002
  APP_NAME: ci-cd-frontend
  WEBSITE_URL: https://tekeyefrontend.clickmasters.pk

jobs:
  # ====================================================
  # 1️⃣ Code Quality & Tests
  # ====================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint || true

      - name: Security Audit
        run: npm audit --audit-level=high || true

      - name: Run Tests
        run: npm test || true

  # ====================================================
  # 2️⃣ Build Application
  # ====================================================
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: frontend/.next
          retention-days: 1

  # ====================================================
  # 3️⃣ Manual Approval Before Production
  # ====================================================
  approval:
    name: Manual Approval Required
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ env.WEBSITE_URL }}
    
    steps:
      - name: Display Approval Instructions
        run: |
          echo "=========================================="
          echo "⏳ MANUAL APPROVAL REQUIRED"
          echo "=========================================="
          echo ""
          echo "📋 Deployment Details:"
          echo "   - Environment: production"
          echo "   - Website: ${{ env.WEBSITE_URL }}"
          echo "   - App Name: ${{ env.APP_NAME }}"
          echo "   - Port: ${{ env.APP_PORT }}"
          echo ""
          echo "🔍 How to Approve:"
          echo "   1. Go to the Actions tab in GitHub"
          echo "   2. Click on this workflow run"
          echo "   3. Look for the 'Manual Approval Required' job"
          echo "   4. Click 'Review deployments' button"
          echo "   5. Select 'Approve' or 'Reject'"
          echo ""
          echo "⏳ Waiting for approval..."
          echo "=========================================="

  # ====================================================
  # 4️⃣ Deploy to VPS (With Rollback Functionality)
  # ====================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approval
    environment:
      name: production
      url: ${{ env.WEBSITE_URL }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy Application with Rollback
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            
            echo "=========================================="
            echo "🚀 DEPLOYMENT STARTED"
            echo "=========================================="
            
            # Load NVM
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              source "$NVM_DIR/nvm.sh"
              echo "✅ NVM loaded"
            else
              echo "❌ NVM not found"
              exit 1
            fi
            
            # Use Node.js
            echo "Using Node.js:"
            nvm use 20 || nvm install 20
            node -v
            npm -v
            
            # Navigate to app directory
            APP_DIR="${{ secrets.APP_DIR }}"
            if [ ! -d "$APP_DIR" ]; then
              echo "❌ App directory not found: $APP_DIR"
              exit 1
            fi
            
            cd "$APP_DIR"
            
            # Create backup directory if it doesn't exist
            BACKUP_DIR="$APP_DIR/../backups"
            mkdir -p "$BACKUP_DIR"
            
            # Save current commit and create backup before pulling
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            PREVIOUS_COMMIT_SHORT=$(echo $PREVIOUS_COMMIT | cut -c1-7)
            echo "📦 Current commit: $PREVIOUS_COMMIT_SHORT"
            
            # Create timestamp for backup
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
            BACKUP_PATH="$BACKUP_DIR/backup_${PREVIOUS_COMMIT_SHORT}_${TIMESTAMP}"
            
            # Backup current node_modules and .next for quick rollback
            echo "💾 Creating backup of current build..."
            if [ -d "node_modules" ] && [ -d ".next" ]; then
              mkdir -p "$BACKUP_PATH"
              cp -r node_modules .next package.json package-lock.json "$BACKUP_PATH/" 2>/dev/null || true
              echo "✅ Backup created at: $BACKUP_PATH"
            fi
            
            # Store current PM2 logs
            echo "📝 Saving PM2 logs..."
            pm2 logs "${{ env.APP_NAME }}" --lines 100 --nostream > "$BACKUP_PATH/pm2_logs.txt" 2>/dev/null || true
            
            # Pull latest code
            echo "📥 Fetching latest code..."
            git fetch origin
            
            # Store new commit hash
            NEW_COMMIT=$(git rev-parse origin/master)
            NEW_COMMIT_SHORT=$(echo $NEW_COMMIT | cut -c1-7)
            echo "📦 New commit: $NEW_COMMIT_SHORT"
            
            # Try to pull new code
            echo "🔄 Pulling new code..."
            if ! git pull origin master; then
              echo "❌ Failed to pull code"
              exit 1
            fi
            
            # Install dependencies
            echo "📦 Installing dependencies..."
            if ! npm ci; then
              echo "❌ Failed to install dependencies"
              echo "🔄 Rolling back to previous version..."
              git reset --hard "$PREVIOUS_COMMIT"
              exit 1
            fi
            
            # Build application
            echo "🏗️ Building application..."
            if ! npm run build; then
              echo "❌ Build failed"
              echo "🔄 Rolling back to previous version..."
              git reset --hard "$PREVIOUS_COMMIT"
              
              # Restore node_modules from backup if build fails
              if [ -d "$BACKUP_PATH/node_modules" ]; then
                echo "📦 Restoring node_modules from backup..."
                rm -rf node_modules
                cp -r "$BACKUP_PATH/node_modules" ./
              fi
              
              exit 1
            fi
            
            # Setup PM2 if not exists
            if ! command -v pm2 &> /dev/null; then
              echo "📦 Installing PM2 globally..."
              npm install -g pm2
            fi
            
            # Start/Restart application
            echo "🔄 Starting application with PM2..."
            if pm2 list | grep -q "${{ env.APP_NAME }}"; then
              pm2 restart "${{ env.APP_NAME }}"
            else
              pm2 start npm --name "${{ env.APP_NAME }}" -- start
            fi
            pm2 save
            
            # Wait for application to start
            echo "⏳ Waiting for application to start..."
            sleep 15
            
            # Health check with retry
            echo "🏥 Performing health check..."
            HEALTHY=false
            for i in {1..5}; do
              LOCAL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 5 \
                --max-time 10 \
                http://localhost:${{ env.APP_PORT }} || echo "failed")
              
              if [ "$LOCAL_STATUS" = "200" ] || [ "$LOCAL_STATUS" = "301" ] || [ "$LOCAL_STATUS" = "302" ]; then
                HEALTHY=true
                echo "✅ Health check passed (HTTP $LOCAL_STATUS)"
                break
              else
                echo "⏳ Health check attempt $i/5: $LOCAL_STATUS"
                sleep 5
              fi
            done
            
            # Rollback if health check fails
            if [ "$HEALTHY" = false ]; then
              echo "❌ Health check failed after deployment"
              echo "🔄 Rolling back to previous version..."
              
              # Revert code
              git reset --hard "$PREVIOUS_COMMIT"
              
              # Restore from backup
              if [ -d "$BACKUP_PATH" ]; then
                echo "📦 Restoring from backup..."
                rm -rf node_modules .next
                cp -r "$BACKUP_PATH/node_modules" "$BACKUP_PATH/.next" ./ 2>/dev/null || true
                cp "$BACKUP_PATH/package.json" "$BACKUP_PATH/package-lock.json" ./ 2>/dev/null || true
              fi
              
              # Restart with old version
              pm2 restart "${{ env.APP_NAME }}"
              sleep 10
              
              echo "❌ Deployment failed - rolled back to commit $PREVIOUS_COMMIT_SHORT"
              exit 1
            fi
            
            # Clean up old backups (keep last 5)
            echo "🧹 Cleaning up old backups..."
            cd "$BACKUP_DIR"
            ls -t | tail -n +6 | xargs -r rm -rf
            cd "$APP_DIR"
            
            echo "=========================================="
            echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY"
            echo "=========================================="
            echo "🌐 Website: ${{ env.WEBSITE_URL }}"
            echo "📱 App: ${{ env.APP_NAME }}"
            echo "📦 New commit: $NEW_COMMIT_SHORT"
            echo "🔄 Previous commit: $PREVIOUS_COMMIT_SHORT"
          EOF

  # ====================================================
  # 5️⃣ Post Deployment Verification
  # ====================================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    
    steps:
      - name: Verify Website is Accessible
        run: |
          echo "=========================================="
          echo "🔍 VERIFYING DEPLOYMENT"
          echo "=========================================="
          
          MAX_ATTEMPTS=12
          ATTEMPT=1
          SUCCESS=false
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."
            
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 20 \
              --location \
              "${{ env.WEBSITE_URL }}" || echo "000")
            
            case $HTTP_CODE in
              200|301|302)
                echo "✅ Website is accessible! (HTTP $HTTP_CODE)"
                SUCCESS=true
                break
                ;;
              000)
                echo "⏳ Connection timeout - retrying..."
                ;;
              *)
                if [ $HTTP_CODE -ge 200 ] && [ $HTTP_CODE -lt 500 ]; then
                  echo "✅ Website responded with HTTP $HTTP_CODE"
                  SUCCESS=true
                  break
                else
                  echo "⚠️ Got HTTP $HTTP_CODE - retrying..."
                fi
                ;;
            esac
            
            ATTEMPT=$((ATTEMPT + 1))
            [ $ATTEMPT -le $MAX_ATTEMPTS ] && sleep 10
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ Website verification failed"
            exit 1
          fi

  # ====================================================
  # 6️⃣ Rollback Job (if verification fails)
  # ====================================================
  rollback:
    name: Automatic Rollback
    runs-on: ubuntu-latest
    needs: [deploy, verify]
    if: failure()
    
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
      
      - name: Perform Emergency Rollback
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            echo "=========================================="
            echo "🚨 EMERGENCY ROLLBACK INITIATED"
            echo "=========================================="
            
            APP_DIR="${{ secrets.APP_DIR }}"
            BACKUP_DIR="$APP_DIR/../backups"
            
            cd "$APP_DIR"
            
            # Get the latest backup
            LATEST_BACKUP=$(ls -t "$BACKUP_DIR" | head -1)
            
            if [ ! -z "$LATEST_BACKUP" ] && [ -d "$BACKUP_DIR/$LATEST_BACKUP" ]; then
              echo "📦 Found backup: $LATEST_BACKUP"
              
              # Restore from backup
              rm -rf node_modules .next
              cp -r "$BACKUP_DIR/$LATEST_BACKUP/node_modules" \
                    "$BACKUP_DIR/$LATEST_BACKUP/.next" \
                    "$BACKUP_DIR/$LATEST_BACKUP/package.json" \
                    "$BACKUP_DIR/$LATEST_BACKUP/package-lock.json" ./ 2>/dev/null || true
              
              # Restart application
              pm2 restart "${{ env.APP_NAME }}"
              
              echo "✅ Rollback completed successfully"
            else
              echo "❌ No backup found for rollback"
              exit 1
            fi
          EOF

  # ====================================================
  # 7️⃣ Deployment Summary
  # ====================================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [quality, build, approval, deploy, verify, rollback]
    if: always()
    
    steps:
      - name: Display Summary
        run: |
          echo "=========================================="
          echo "📊 DEPLOYMENT SUMMARY"
          echo "=========================================="
          echo ""
          echo "Job Statuses:"
          echo "-------------"
          echo "📝 Quality: ${{ needs.quality.result }}"
          echo "🏗️ Build: ${{ needs.build.result }}"
          echo "👤 Approval: ${{ needs.approval.result }}"
          echo "🚀 Deploy: ${{ needs.deploy.result }}"
          echo "🔍 Verify: ${{ needs.verify.result }}"
          echo "🔄 Rollback: ${{ needs.rollback.result }}"
          echo ""
          echo "Deployment Details:"
          echo "------------------"
          echo "🌐 Website: ${{ env.WEBSITE_URL }}"
          echo "📱 App Name: ${{ env.APP_NAME }}"
          echo "🔌 Port: ${{ env.APP_PORT }}"
          echo ""
          
          if [ "${{ needs.deploy.result }}" = "success" ] && [ "${{ needs.verify.result }}" = "success" ]; then
            echo "✅✅ Production deployment completed successfully!"
          elif [ "${{ needs.rollback.result }}" = "success" ]; then
            echo "⚠️ Deployment failed - Automatically rolled back to previous version"
          else
            echo "❌ Deployment failed - Manual intervention required"
          fi
          
          echo "=========================================="